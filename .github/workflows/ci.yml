name: CI
on:
  pull_request:
  push:
    branches: ["main"]
jobs:
  CI:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Build-time placeholders for self-host stack (no external SaaS)
      APP_PUBLIC_ORIGIN: "http://localhost:3000"
      DATABASE_URL: "postgres://ci:ci@127.0.0.1:5432/ci"
      JWT_SECRET: "ci_jwt_secret_at_least_32_characters_min"
      STORAGE_SIGNING_SECRET: "ci_storage_signing_at_least_32_characters"
      UPLOAD_ROOT: "./var/uploads"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
